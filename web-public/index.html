<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<title>Chow</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; background: #0a0a0a; }
body { height: 100%; min-height: 100%; background: #0a0a0a; color: #e4e4e7; font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; overflow: hidden; }

/* ── PIN Screen ── */
.pin-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #0a0a0a;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
}
.pin-screen.hidden { display: none; }
.pin-screen .dragon { font-size: 64px; }
.pin-screen input {
  background: #1a1a1a; border: 2px solid #333; color: #fff;
  font-size: 28px; padding: 14px 24px; border-radius: 14px;
  text-align: center; width: 180px; letter-spacing: 10px;
  outline: none; -webkit-appearance: none;
}
.pin-screen input:focus { border-color: #10b981; }
.pin-screen .pin-err { color: #f87171; font-size: 14px; min-height: 22px; }
.pin-screen .pin-hint { color: #555; font-size: 13px; }

/* ── App Shell ── */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
.app.hidden { display: none; }

/* Header */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px; background: #111; border-bottom: 1px solid #222;
  flex-shrink: 0;
}
.hdr-left h1 { font-size: 17px; font-weight: 600; margin: 0; }
.hdr-left .dot { font-size: 11px; color: #10b981; margin-top: 2px; }
.hdr-right { display: flex; gap: 8px; }
.hdr-right a, .hdr-right button {
  background: none; border: 1px solid #333; color: #888; font-size: 12px;
  padding: 5px 10px; border-radius: 6px; cursor: pointer; text-decoration: none;
}

/* Messages */
.msgs {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
  -webkit-overflow-scrolling: touch;
}
.m { max-width: 88%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; white-space: pre-wrap; }
.m.u { align-self: flex-end; background: #10b981; color: #000; border-bottom-right-radius: 6px; }
.m.a { align-self: flex-start; background: #1a1a1a; border: 1px solid #282828; border-bottom-left-radius: 6px; }
.m.t { align-self: flex-start; color: #666; font-size: 12px; padding: 5px 10px; border: 1px dashed #333; border-radius: 8px; font-family: monospace; background: none; }
.m.e { align-self: center; background: #7f1d1d; color: #fca5a5; font-size: 13px; border-radius: 8px; }
.m.s { align-self: center; color: #555; font-size: 12px; background: none; }
.m code { background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 13px; }
.m pre { background: rgba(255,255,255,0.04); padding: 8px; border-radius: 8px; overflow-x: auto; margin: 4px 0; font-size: 13px; }
.m pre code { background: none; padding: 0; }
.typing { color: #555; font-size: 13px; padding: 6px 0; align-self: flex-start; }

/* Composer */
.comp {
  display: flex; align-items: flex-end; gap: 8px;
  padding: 8px 12px; background: #111; border-top: 1px solid #222;
  flex-shrink: 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom, 8px));
}
.comp textarea {
  flex: 1; background: #0a0a0a; border: 1px solid #333; color: #e4e4e7;
  font-size: 16px; padding: 10px 14px; border-radius: 22px;
  resize: none; max-height: 120px; line-height: 1.4;
  outline: none; font-family: inherit; -webkit-appearance: none;
}
.comp textarea:focus { border-color: #10b981; }
.comp textarea::placeholder { color: #555; }
.comp .sendbtn {
  width: 42px; height: 42px; border-radius: 50%; background: #10b981;
  border: none; color: #000; cursor: pointer; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
}
.comp .sendbtn:disabled { opacity: 0.25; }
.comp .sendbtn svg { width: 20px; height: 20px; }
</style>
</head>
<body>

<div class="pin-screen" id="pinScreen">
  <div class="dragon">&#x1F409;</div>
  <input id="pinInput" type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="----" autofocus>
  <div class="pin-err" id="pinErr"></div>
  <div class="pin-hint">Enter PIN</div>
</div>

<div class="app hidden" id="app">
  <div class="hdr">
    <div class="hdr-left">
      <h1>&#x1F409; Mr Chow</h1>
      <div class="dot" id="status">connecting...</div>
    </div>
    <div class="hdr-right">
      <a href="/terminal/" target="_blank">&#x1F4BB; Term</a>
      <button onclick="newChat()">New</button>
    </div>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="comp">
    <textarea id="inp" rows="1" placeholder="Message Chow..." autocomplete="off" autocorrect="on" spellcheck="true"></textarea>
    <button class="sendbtn" id="sendBtn" onclick="send()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
  </div>
</div>

<script>
(function() {
  // Config
  var PIN_CODE = '4982';
  var STORAGE_KEY = 'chow_ok';
  var BASE = '/chow/api';

  // Elements
  var pinScreen = document.getElementById('pinScreen');
  var pinInput = document.getElementById('pinInput');
  var pinErr = document.getElementById('pinErr');
  var appEl = document.getElementById('app');
  var msgsEl = document.getElementById('msgs');
  var inpEl = document.getElementById('inp');
  var sendBtnEl = document.getElementById('sendBtn');
  var statusEl = document.getElementById('status');
  var busy = false;

  // PIN auth
  function isAuthed() {
    try { return localStorage.getItem(STORAGE_KEY) === '1'; } catch(e) { return false; }
  }

  function showApp() {
    pinScreen.classList.add('hidden');
    appEl.classList.remove('hidden');
    loadHistory();
    checkHealth();
    setInterval(checkHealth, 30000);
    setTimeout(function() { inpEl.focus(); }, 100);
  }

  pinInput.addEventListener('input', function() {
    var v = pinInput.value;
    if (v.length >= 4) {
      if (v === PIN_CODE) {
        try { localStorage.setItem(STORAGE_KEY, '1'); } catch(e) {}
        showApp();
      } else {
        pinErr.textContent = 'Wrong PIN';
        pinInput.value = '';
      }
    }
  });

  if (isAuthed()) showApp();

  // Helpers
  function scroll() { msgsEl.scrollTop = msgsEl.scrollHeight; }

  function addBubble(cls, text) {
    var d = document.createElement('div');
    d.className = 'm ' + cls;
    d.textContent = text;
    msgsEl.appendChild(d);
    scroll();
    return d;
  }

  function md(text) {
    var s = text;
    s = s.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
    return s;
  }

  // Auto-resize
  inpEl.addEventListener('input', function() {
    inpEl.style.height = 'auto';
    inpEl.style.height = Math.min(inpEl.scrollHeight, 120) + 'px';
    sendBtnEl.disabled = !inpEl.value.trim() || busy;
  });
  inpEl.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  // API
  function loadHistory() {
    fetch(BASE + '/history').then(function(r) { return r.json(); }).then(function(data) {
      msgsEl.innerHTML = '';
      var msgs = data.messages || [];
      for (var i = 0; i < msgs.length; i++) {
        var d = document.createElement('div');
        d.className = 'm ' + (msgs[i].role === 'user' ? 'u' : 'a');
        d.innerHTML = md(msgs[i].text);
        msgsEl.appendChild(d);
      }
      scroll();
    }).catch(function() {});
  }

  function checkHealth() {
    fetch(BASE + '/health').then(function(r) { return r.json(); }).then(function(data) {
      statusEl.textContent = data.busy ? '&#x1F527; working...' : '&#x1F7E2; online';
      statusEl.innerHTML = statusEl.textContent;
    }).catch(function() {
      statusEl.innerHTML = '&#x1F534; offline';
    });
  }

  window.send = function() {
    var text = inpEl.value.trim();
    if (!text || busy) return;
    busy = true;
    sendBtnEl.disabled = true;
    inpEl.value = '';
    inpEl.style.height = 'auto';
    addBubble('u', text);
    statusEl.innerHTML = '&#x1F527; thinking...';

    var aBubble = document.createElement('div');
    aBubble.className = 'm a';
    msgsEl.appendChild(aBubble);

    var typing = document.createElement('div');
    typing.className = 'typing';
    typing.textContent = 'Chow is thinking...';
    msgsEl.appendChild(typing);
    scroll();

    fetch(BASE + '/message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text })
    }).then(function(res) {
      var reader = res.body.getReader();
      var decoder = new TextDecoder();
      var buf = '';
      var full = '';

      function pump() {
        return reader.read().then(function(result) {
          if (result.done) return;
          buf += decoder.decode(result.value, { stream: true });
          var lines = buf.split('\n');
          buf = lines.pop() || '';
          for (var i = 0; i < lines.length; i++) {
            if (lines[i].indexOf('data: ') !== 0) continue;
            try {
              var d = JSON.parse(lines[i].substring(6));
              if (d.type === 'delta') {
                full += d.delta;
                aBubble.innerHTML = md(full);
                typing.textContent = 'Chow is typing...';
                scroll();
              } else if (d.type === 'tool') {
                var t = document.createElement('div');
                t.className = 'm t';
                t.textContent = '\uD83D\uDD27 ' + d.tool;
                msgsEl.insertBefore(t, typing);
                scroll();
              } else if (d.type === 'done') {
                aBubble.innerHTML = md(d.text);
              } else if (d.type === 'error') {
                addBubble('e', d.text);
              }
            } catch(e) {}
          }
          return pump();
        });
      }
      return pump();
    }).catch(function(err) {
      addBubble('e', 'Connection error: ' + err.message);
    }).then(function() {
      if (typing.parentNode) typing.remove();
      busy = false;
      sendBtnEl.disabled = !inpEl.value.trim();
      statusEl.innerHTML = '&#x1F7E2; online';
      scroll();
    });
  };

  window.newChat = function() {
    if (!confirm('Start fresh?')) return;
    fetch(BASE + '/reset', { method: 'POST' }).catch(function() {});
    msgsEl.innerHTML = '';
    addBubble('s', 'New conversation started');
  };
})();
</script>
</body>
</html>
