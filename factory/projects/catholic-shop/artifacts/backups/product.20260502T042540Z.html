                const urlParams = new URLSearchParams(window.location.search);
                const productId = urlParams.get('id') || 'prod_shop-sanctuaire-lourdes_fr-water-001';

                try {
                    // Fetch product from API
                    const resp = await fetch(`/api/v1/catalog/feed?limit=50`);
                    const data = await resp.json();
                    const raw = data.items.find(p => p.product_id === productId);

                    if (!raw) {
                        this.product = this.codexData()['prod_shop-sanctuaire-lourdes_fr-water-001'];
                    } else {
                        this.product = this.augmentProduct(raw);

                } catch (e) {
                    this.product = this.codexData()['prod_shop-sanctuaire-lourdes_fr-water-001'];

                    shop_story: raw.story || ''
                };
