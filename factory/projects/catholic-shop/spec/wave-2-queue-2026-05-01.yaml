- id: CS-029
  title: Conversational shopping chat UI (artifact-style)
  lane: ai
  priority: p2
  risk: high
  status: planned
  depends_on: [CS-025]
  description: |
    Vision: A "Have a Conversation" button in the bottom nav (next to Concierge)
    that opens a full-screen chat interface. Users chat naturally with an AI
    shopping assistant that surfaces products as rich inline "artifacts" —
    think Claude artifacts but for Catholic devotional items.

    Core experience:
    - User: "I'm looking for a first communion gift for my goddaughter. She
      loves St. Thérèse."
    - AI: responds conversationally, then drops in 2-3 product cards as
      browsable artifacts right in the chat stream
    - Each artifact has: image, title, price, provenance badge, "View Details"
      and "Add to Cart" actions — all inline, no modal
    - User can keep chatting to refine ("Something under $50" → artifacts update)
    - Chat history persists per session
    - Eventually: multi-turn, remembers context, can compare products side-by-side

    UI pattern: Claude-style chat panel — messages on the left, artifacts can
    expand inline. Mobile-first: chat input at bottom, artifacts scroll naturally
    in the message stream.
  done_when:
  - "Have a Conversation" button visible in bottom nav (next to Concierge)
  - Tapping opens full chat UI with message history
  - AI responds conversationally with inline product artifact cards
  - Artifacts are interactive (view details, add to cart) without leaving chat
  - Chat context persists for the session (multi-turn)
  - Graceful fallback when AI is unavailable
  artifacts:
  - frontend/chat.html (or integrated into index.html as a view)
  - backend/api/app.py (chat/conversation endpoint)
  - spec/conversational-shopping-ux-spec.md
