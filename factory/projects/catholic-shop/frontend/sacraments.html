<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Browse by Life Moment | Catholic Market</title>
  <meta name="description" content="Find Catholic devotional gifts by Baptism, First Communion, Confirmation, Wedding, Healing, and Home Blessing." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: { DEFAULT: '#f5f0e8', light: '#faf8f4', dark: '#e8e0d0' },
            ink: { DEFAULT: '#2c1810', light: '#5c3d2e', muted: '#8b7355' },
            gold: { DEFAULT: '#b8860b', light: '#d4a843', pale: '#f0e6c8' },
            rubric: { DEFAULT: '#722f37', light: '#964b53' }
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['"Crimson Text"', 'Georgia', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    body::after { content: ''; position: fixed; inset: 0; z-index: 1000; pointer-events: none; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 256px; }
    .gold-rule { border: 0; height: 1px; background: linear-gradient(to right, transparent, #b8860b44, #b8860b88, #b8860b44, transparent); }
  </style>
</head>
<body class="bg-parchment text-ink font-body antialiased" x-data="sacramentsPage()" x-init="init()">
  <main class="max-w-3xl mx-auto min-h-screen px-5 sm:px-6 pb-24">
    <header class="pt-8 pb-8">
      <a :href="sitePath('')" class="inline-flex items-center gap-2 text-ink-muted hover:text-gold transition-colors font-display italic text-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to marketplace
      </a>
      <div class="text-center mt-10">
        <p class="text-xs uppercase tracking-[0.25em] text-gold font-display">Guided browse</p>
        <h1 class="font-display text-4xl sm:text-5xl font-semibold mt-2">Browse by Life Moment</h1>
        <p class="font-display italic text-xl text-ink-light mt-3">Find a gift for the sacrament, not just the shelf.</p>
      </div>
    </header>

    <section class="grid sm:grid-cols-2 gap-4 mb-12">
      <template x-for="sac in sacraments" :key="sac.id">
        <button @click="selectSacrament(sac.id)" class="text-left p-5 bg-parchment-light border transition-colors" :class="selected === sac.id ? 'border-gold shadow-sm' : 'border-parchment-dark hover:border-gold/40'">
          <div class="flex items-center gap-3">
            <span class="w-12 h-12 border border-gold/40 text-gold font-display text-sm tracking-widest flex items-center justify-center" x-text="sac.mark"></span>
            <div>
              <h2 class="font-display text-2xl font-semibold leading-none" x-text="sac.name"></h2>
              <p class="text-xs uppercase tracking-wide text-ink-muted mt-1" x-text="sac.count + ' gifts' "></p>
            </div>
          </div>
          <p class="text-ink-light text-sm mt-4 leading-relaxed" x-text="sac.desc"></p>
        </button>
      </template>
    </section>

    <section x-show="selected !== null" x-cloak>
      <hr class="gold-rule mb-8" />
      <div class="flex items-start justify-between gap-4 mb-6">
        <div>
          <p class="text-xs uppercase tracking-[0.25em] text-gold font-display" x-text="selectedSac.mark"></p>
          <h2 class="font-display text-3xl font-semibold mt-1" x-text="selectedSac.name"></h2>
          <p class="text-ink-light italic mt-2" x-text="selectedSac.subtitle"></p>
        </div>
        <button @click="selected = null" class="text-ink-muted hover:text-gold font-display italic text-sm shrink-0">All categories</button>
      </div>

      <div class="grid sm:grid-cols-2 gap-4">
        <template x-for="p in selectedProducts" :key="p.product_id">
          <a :href="sitePath('product/' + encodeURIComponent(p.product_id))" class="flex gap-4 p-4 bg-parchment-light border border-parchment-dark hover:border-gold/40 transition-colors group">
            <img :src="p.image_url || placeholderImage()" :alt="p.title" class="w-20 h-24 object-cover bg-parchment-dark flex-shrink-0" @error="$el.src=placeholderImage()" />
            <div class="min-w-0">
              <h3 class="font-display text-xl font-semibold leading-tight group-hover:text-gold transition-colors" x-text="p.title"></h3>
              <p class="text-xs text-ink-muted italic mt-1" x-text="p.city + ', ' + p.country"></p>
              <p class="text-sm text-ink-light mt-2 line-clamp-2" x-text="lede(p)"></p>
              <p class="font-display text-gold mt-2" x-text="formatMoney(p.price_cents)"></p>
            </div>
          </a>
        </template>
      </div>

      <div x-show="selectedProducts.length === 0" class="text-center py-12 border border-parchment-dark bg-parchment-light">
        <p class="font-display text-xl text-ink-light italic">No products yet for this life moment.</p>
        <p class="text-ink-muted mt-2">We are working with Catholic shops and artisans to add more.</p>
      </div>
    </section>
  </main>

  <script>
    function sacramentsPage() {
      return {
        allProducts: [],
        sacraments: [],
        selected: null,
        async init() {
          try {
            const data = await this.api('api/v1/catalog/feed?limit=80');
            this.allProducts = data.items || [];
          } catch (e) {
            this.allProducts = [];
          }
          this.buildSacraments();
        },
        basePath() { return window.location.pathname.startsWith('/catholic-shop') ? '/catholic-shop' : ''; },
        sitePath(path = '') { const clean = String(path || '').replace(/^\/+/, ''); return clean ? `${this.basePath()}/${clean}` : `${this.basePath()}/`; },
        apiUrl(path) { return `${this.basePath()}/${String(path || '').replace(/^\/+/, '')}`; },
        async api(path, opts = {}) {
          const res = await fetch(this.apiUrl(path), opts);
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(`Request failed (${res.status})`);
          return data;
        },
        placeholderImage() { return 'https://via.placeholder.com/240x288/f5f0e8/8b7355?text=CM'; },
        formatMoney(cents) { return '$' + (Number(cents || 0) / 100).toFixed(2); },
        lede(p) { const story = String(p?.story || '').trim(); return story ? story.split('.').filter(Boolean)[0] + '.' : 'Catholic devotional item.'; },
        buildSacraments() {
          const defs = [
            { id: 0, name: 'Baptism', mark: 'BAP', desc: 'For the newest Christian. Water, light, white garments, and prayers for a life in Christ.', subtitle: 'Gifts for the beginning of a life in Christ.', tags: ['baptism', 'home_blessing', 'protection'] },
            { id: 1, name: 'First Communion', mark: 'EUC', desc: 'Rosaries, medals, prayer books, and keepsakes for receiving the Eucharist.', subtitle: 'Gifts for the first reception of the Holy Eucharist.', tags: ['first_communion', 'devotion', 'rosary'] },
            { id: 2, name: 'Confirmation', mark: 'CNF', desc: 'Crosses, icons, medals, and patron-saint gifts for being sealed with the Holy Spirit.', subtitle: 'Gifts for being sealed with the Holy Spirit.', tags: ['confirmation', 'patron_saint', 'protection', 'rcia'] },
            { id: 3, name: 'Wedding', mark: 'MAR', desc: 'Rosaries, crucifixes, and devotional pieces for the sacrament of Holy Matrimony.', subtitle: 'Gifts for the sacrament of Holy Matrimony.', tags: ['wedding', 'home_blessing', 'devotion'] },
            { id: 4, name: 'Healing & Comfort', mark: 'HLC', desc: 'Holy water, candles, medals, and items chosen for peace in sickness or grief.', subtitle: 'Gifts for those who need peace and healing.', tags: ['healing', 'anointing', 'comfort', 'protection'] },
            { id: 5, name: 'Home Blessing', mark: 'DOM', desc: 'Crucifixes, icons, candles, and devotional objects for the domestic church.', subtitle: 'Gifts to make every home a sacred space.', tags: ['home_blessing', 'crucifix', 'icon'] }
          ];
          this.sacraments = defs.map(d => ({ ...d, count: this.matchProducts(d).length }));
        },
        matchProducts(sac) { return this.allProducts.filter(p => (p.sacrament_tags || []).some(t => (sac.tags || []).includes(t)) || (p.tags || []).some(t => (sac.tags || []).includes(t))); },
        selectSacrament(id) { this.selected = id; },
        get selectedSac() { return this.sacraments.find(s => s.id === this.selected) || {}; },
        get selectedProducts() { return this.selected === null ? [] : this.matchProducts(this.selectedSac); }
      };
    }
  </script>
</body>
</html>
