<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>Shop Profile | Catholic Market</title>
  <meta name="description" content="Catholic Market shop profile with story, verification notes, shipping regions, and devotional products." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: { DEFAULT: '#f5f0e8', light: '#faf8f4', dark: '#e8e0d0' },
            ink: { DEFAULT: '#2c1810', light: '#5c3d2e', muted: '#8b7355' },
            gold: { DEFAULT: '#b8860b', light: '#d4a843', pale: '#f0e6c8' },
            rubric: { DEFAULT: '#722f37', light: '#964b53' }
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['"Crimson Text"', 'Georgia', 'serif']
          }
        }
      }
    }
  </script>
  <style>
    [x-cloak] { display: none !important; }
    body::after { content: ''; position: fixed; inset: 0; z-index: 1000; pointer-events: none; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size: 256px; }
    .gold-rule { border: 0; height: 1px; background: linear-gradient(to right, transparent, #b8860b44, #b8860b88, #b8860b44, transparent); }
    .drop-cap::first-letter { float: left; font-family: 'Cormorant Garamond', serif; font-size: 3.8rem; line-height: .75; padding-right: 8px; padding-top: 2px; color: #722f37; font-weight: 600; }
  </style>
</head>
<body class="bg-parchment text-ink font-body antialiased" x-data="shopPage()" x-init="init()">
  <main class="max-w-3xl mx-auto min-h-screen px-5 sm:px-6 pb-24">
    <header class="pt-8 pb-8">
      <a :href="sitePath('')" class="inline-flex items-center gap-2 text-ink-muted hover:text-gold transition-colors font-display italic text-lg">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        Back to the marketplace
      </a>
    </header>

    <section x-show="loading" class="py-16" x-cloak>
      <div class="animate-pulse space-y-5">
        <div class="h-10 bg-parchment-dark w-2/3"></div>
        <div class="h-32 bg-parchment-dark"></div>
        <div class="grid grid-cols-2 gap-4"><div class="h-40 bg-parchment-dark"></div><div class="h-40 bg-parchment-dark"></div></div>
      </div>
    </section>

    <section x-show="error" class="py-20 text-center" x-cloak>
      <p class="font-display text-2xl text-ink">We could not find that shop.</p>
      <p class="text-ink-muted italic mt-2" x-text="error"></p>
      <a :href="sitePath('')" class="inline-block mt-6 px-5 py-2 border border-gold text-gold font-display uppercase tracking-widest text-xs hover:bg-gold hover:text-parchment-light transition-colors">Return to market</a>
    </section>

    <article x-show="shop && !loading && !error" x-cloak>
      <section class="text-center max-w-2xl mx-auto">
        <p class="text-xs uppercase tracking-[0.25em] text-gold font-display" x-text="shop.city + ', ' + shop.country"></p>
        <h1 class="font-display text-5xl sm:text-6xl font-semibold leading-none mt-3" x-text="shop.name"></h1>
        <div class="flex items-center justify-center gap-2 mt-5 text-sm text-ink-muted italic" x-show="shop.verified">
          <svg class="w-4 h-4 text-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          Catholic Market verification in progress
        </div>
        <p class="drop-cap text-lg leading-relaxed text-ink-light mt-8 text-left" x-text="shop.story || 'This shop profile is being prepared with artisan and Catholic community details.'"></p>
      </section>

      <hr class="gold-rule my-10" />

      <section class="grid sm:grid-cols-3 gap-4">
        <div class="border border-parchment-dark bg-parchment-light p-5">
          <p class="text-xs uppercase tracking-[0.18em] text-gold font-display mb-2">Location</p>
          <p class="text-ink-light" x-text="shop.city + ', ' + shop.country"></p>
        </div>
        <div class="border border-parchment-dark bg-parchment-light p-5">
          <p class="text-xs uppercase tracking-[0.18em] text-gold font-display mb-2">Shipping</p>
          <p class="text-ink-light" x-text="shippingText()"></p>
        </div>
        <div class="border border-parchment-dark bg-parchment-light p-5">
          <p class="text-xs uppercase tracking-[0.18em] text-gold font-display mb-2">Catalog</p>
          <p class="text-ink-light" x-text="products.length + ' devotional item' + (products.length === 1 ? '' : 's')"></p>
        </div>
      </section>

      <hr class="gold-rule my-10" />

      <section>
        <div class="flex items-end justify-between gap-4 mb-5">
          <div>
            <p class="text-xs uppercase tracking-[0.25em] text-gold font-display">From this shop</p>
            <h2 class="font-display text-3xl font-semibold mt-1">Products</h2>
          </div>
          <a :href="sitePath('chat') + '?shop=' + encodeURIComponent(shop.shop_id || '')" class="text-gold hover:text-gold-light font-display uppercase tracking-widest text-xs font-semibold">Ask concierge</a>
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <template x-for="p in products" :key="p.product_id">
            <a :href="sitePath('product/' + encodeURIComponent(p.product_id))" class="flex gap-4 p-4 bg-parchment-light border border-parchment-dark hover:border-gold/40 transition-colors group">
              <img :src="p.image_url || placeholderImage()" :alt="p.title" class="w-20 h-24 object-cover bg-parchment-dark flex-shrink-0" @error="$el.src=placeholderImage()" />
              <div class="min-w-0">
                <h3 class="font-display text-xl font-semibold leading-tight group-hover:text-gold transition-colors" x-text="p.title"></h3>
                <p class="text-xs text-ink-muted italic mt-1" x-text="p.city + ', ' + p.country"></p>
                <p class="text-sm text-ink-light mt-2 line-clamp-2" x-text="lede(p)"></p>
                <p class="font-display text-gold mt-2" x-text="formatMoney(p.price_cents)"></p>
              </div>
            </a>
          </template>
        </div>
      </section>
    </article>
  </main>

  <script>
    function shopPage() {
      return {
        shop: null,
        products: [],
        loading: true,
        error: '',
        async init() {
          const shopId = this.shopIdFromUrl();
          if (!shopId) {
            this.error = 'No shop identifier was provided.';
            this.loading = false;
            return;
          }
          try {
            const data = await this.api(`api/v1/shops/${encodeURIComponent(shopId)}`);
            this.shop = data.shop;
            this.products = data.products || [];
            if (this.shop?.name) document.title = `${this.shop.name} | Catholic Market`;
          } catch (e) {
            this.error = e.message || 'Shop unavailable.';
          }
          this.loading = false;
        },
        basePath() { return window.location.pathname.startsWith('/catholic-shop') ? '/catholic-shop' : ''; },
        sitePath(path = '') { const clean = String(path || '').replace(/^\/+/, ''); return clean ? `${this.basePath()}/${clean}` : `${this.basePath()}/`; },
        apiUrl(path) { return `${this.basePath()}/${String(path || '').replace(/^\/+/, '')}`; },
        shopIdFromUrl() { const parts = window.location.pathname.split('/').filter(Boolean); const idx = parts.indexOf('shop'); return idx >= 0 ? decodeURIComponent(parts[idx + 1] || '') : ''; },
        async api(path, opts = {}) {
          const res = await fetch(this.apiUrl(path), opts);
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(typeof data?.detail === 'string' ? data.detail : `Request failed (${res.status})`);
          return data;
        },
        placeholderImage() { return 'https://via.placeholder.com/240x288/f5f0e8/8b7355?text=CM'; },
        formatMoney(cents) { return '$' + (Number(cents || 0) / 100).toFixed(2); },
        lede(p) { const story = String(p?.story || '').trim(); return story ? story.split('.').filter(Boolean)[0] + '.' : 'Catholic devotional item.'; },
        shippingText() { return Array.isArray(this.shop?.shipping_regions) && this.shop.shipping_regions.length ? this.shop.shipping_regions.join(', ') : 'Shipping regions being verified'; }
      };
    }
  </script>
</body>
</html>
